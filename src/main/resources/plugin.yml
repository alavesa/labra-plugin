name: Labra
version: '0.11.0'
main: fi.alavesa.labra.LabraPlugin
api-version: '1.21'
author: Piia Alavesa
description: Lab equipment - hazard zones, hazmat suits, geiger counter.
commands:
  lab:
    description: Lab commands - give, zone, reload
    usage: |
      /lab give hazmat|geiger|sample|kit|rod|pipette|manual|table [player]
      /lab give scp268|scp1499|scp714|scp018|scp427|scp1033|scp... [player]
      /lab give element <player> <symbol> [count]
      /lab place <creator|burner|centrifuge|fridge|rack|scp294|scp038>
      /lab removemachines | /lab admin
      /lab scp1499 sethere|info
      /lab zone add <name> <radiation|toxic|cryo> <radius>
      /lab zone remove <name> | list | alarm <name> on|off
      /lab reload
    aliases: [labra]
permissions:
  lab.give:
    description: Get lab items (staff only on RP servers)
    default: op
  lab.admin:
    description: Manage hazard zones
    default: op
